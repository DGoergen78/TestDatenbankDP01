services:
  postgres:
    image: postgres:16
    container_name: kursdatenbank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kursdatenbank
      POSTGRES_USER: kursuser
      POSTGRES_PASSWORD: kurspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kursuser -d kursdatenbank"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: kursdatenbank-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
